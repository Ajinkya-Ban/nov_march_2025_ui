    <style>
      .box table,
      th,
      tr,
      td {
        border: 1px solid #000;
        border-collapse: collapse;
      }
      table {
        width: 80%;

      }

        padding: 5px;
      }
      .update {
        width: 75px;
        /* height: 30px; */

        color: white;
        text-decoration: none;
        padding: 10px 30px;
        border-radius: 20px;
      }
      .del {

        /* height: 30px; */
