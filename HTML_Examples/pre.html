<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .box {
        width: 550px;
        height: 300px;
        background-color: black;
        margin: auto;
        box-shadow: rgba(50, 50, 93, 0.25) 0px 50px 100px -20px,
          rgba(0, 0, 0, 0.3) 0px 30px 60px -30px;
        border-top-right-radius: 20%;
      }
      .box h1 {
        color: white;
        text-align: center;
        line-height: 300px;
      }
      #st {
        color: yellow;
      }
      #jb {
        color: crimson;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h1>
        Do <span id="st">Study</span> hard, Yo can Get a
        <span id="jb">Job</span>...!
      </h1>
    </div>
  </body>
</html>
